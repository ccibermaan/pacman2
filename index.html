<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man Antigravity Remake</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Original resolution 224x288, rendered via canvas and scaled via css -->
        <canvas id="gameCanvas" width="224" height="288"></canvas>
        <div id="restart-ui" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
            <button onclick="window.resetGame()" style="background: red; color: white; border: 2px solid white; padding: 10px; font-family: 'Press Start 2P', cursive; cursor: pointer;">RESTART</button>
        </div>
    </div>

    <!-- We use module scripts to separate logic natively -->
    <script type="module" src="src/engine.js"></script>
</body>
</html>
